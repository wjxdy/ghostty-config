# ============================================================
# tmux — catppuccin/tmux 框架 + Gruvbox 配色 + CPU/MEM
# ============================================================

# ===== 基础 =====
set  -g default-terminal "tmux-256color"
set  -ga terminal-overrides ",xterm-256color:Tc"
set  -g extended-keys on
set  -as terminal-features 'xterm*:extkeys'

# ===== Prefix: Ctrl+A =====
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 一键重载配置：Prefix + r
bind r source-file ~/.tmux.conf \; display-message "✔ tmux.conf reloaded"

# 窗格切换：Prefix + hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ===== Copy-mode: vim 风格滚动 =====
# 按 prefix + [ 进入 copy-mode，然后 j/k/g/G/Ctrl+U/Ctrl+D 都按 vim 习惯走
setw -g mode-keys vi
bind-key -T copy-mode-vi J send-keys -N 5 -X cursor-down
bind-key -T copy-mode-vi K send-keys -N 5 -X cursor-up
bind-key -T copy-mode-vi H send-keys -X start-of-line
bind-key -T copy-mode-vi L send-keys -X end-of-line
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
# 直接 prefix + Esc 也进 copy-mode（vim 用户直觉）
bind Escape copy-mode

# ===== 行为 =====
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on
set  -g mouse on
set  -g history-limit 50000
set  -sg escape-time 10
set  -g focus-events on

# 鼠标滚轮不要自动进入 copy-mode；只有 Prefix + [ / Prefix + Esc 主动进入。
# 在 copy-mode、全屏程序或支持鼠标的程序里，滚轮仍交给当前模式/程序处理。
unbind -T root WheelUpPane
unbind -T root WheelDownPane
bind-key -T root WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } {}
bind-key -T root WheelDownPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } {}

# ============================================================
# 状态栏视觉 — catppuccin/tmux + Gruvbox palette
# ============================================================

# ----- Gruvbox 调色板覆盖 catppuccin 默认色 -----
set -g @thm_bg          "#282828"
set -g @thm_fg          "#ebdbb2"
set -g @thm_subtext_1   "#a89984"
set -g @thm_subtext_0   "#928374"
set -g @thm_overlay_2   "#7c6f64"
set -g @thm_overlay_1   "#665c54"
set -g @thm_overlay_0   "#504945"
set -g @thm_surface_2   "#504945"
set -g @thm_surface_1   "#3c3836"
set -g @thm_surface_0   "#3c3836"
set -g @thm_mantle      "#1d2021"
set -g @thm_crust       "#1d2021"

set -g @thm_red         "#fb4934"
set -g @thm_maroon      "#fb4934"
set -g @thm_peach       "#fe8019"
set -g @thm_yellow      "#fabd2f"
set -g @thm_green       "#b8bb26"
set -g @thm_teal        "#8ec07c"
set -g @thm_sky         "#8ec07c"
set -g @thm_sapphire    "#83a598"
set -g @thm_blue        "#83a598"
set -g @thm_lavender    "#83a598"
set -g @thm_mauve       "#d3869b"
set -g @thm_pink        "#d3869b"
set -g @thm_flamingo    "#fb4934"
set -g @thm_rosewater   "#fbf1c7"

# ----- catppuccin 显示选项 -----
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "rounded"   # 圆角风格

# 窗口段显示「窗口编号 + 应用名」
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_window_current_text " #W"

# 左右连接符（圆角）/ 模块文案 —— 须在 catppuccin 主题加载“之前”设好
set -g @catppuccin_status_left_separator  "█"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"
# 不要图标：清空 CPU 模块图标 + 文案前缀加 CPU 文字标识
set -g @catppuccin_cpu_icon ""
set -g @catppuccin_cpu_text "CPU #{cpu_percentage}"

# ----- Pane 边框 -----
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#fabd2f"

# ----- 消息条 / 复制模式 -----
set -g message-style "bg=#fabd2f,fg=#282828,bold"
set -g message-command-style "bg=#fabd2f,fg=#282828"
setw -g mode-style "bg=#fabd2f,fg=#282828"

# ============================================================
# 插件（TPM）
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'             # 提供 cpu/memory 数据
set -g @plugin 'catppuccin/tmux#v2.1.3'            # 主题框架

# 必须放最后
run '~/.tmux/plugins/tpm/tpm'

# ============================================================
# 状态栏拼装（catppuccin v2：必须在主题加载“之后”手动组装 status-left/right）
# v2 不再用 @catppuccin_status_modules_right 自动生成，故放在 run 之后。
# ============================================================
# 左：暖黄 session 名 + 细分隔
set -g status-left-length 60
set -g status-left "#[fg=#fabd2f,bold]   #S #[fg=#665c54,nobold]▕ "

# 右：CPU → 内存 → 时间（纯文字，无色块/无图标，直接调 tmux-cpu 脚本）
set -g status-right-length 120
set -g status-right "#[fg=#fabd2f]CPU #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)  #[fg=#8ec07c]MEM #(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh)  #[fg=#83a598]%Y-%m-%d %H:%M#[default]"

# ⚠️ 关键：tmux-cpu 通过“读取 status-right 字符串、把 #{cpu_percentage}/#{ram_percentage}
# 替换成 #(脚本)”来工作，因此必须在上面 status-right 组装“之后”再跑一次它，
# 否则它启动时 status-right 还没有这些占位符可替换 → CPU/内存永远空白。
run '~/.tmux/plugins/tmux-cpu/cpu.tmux'
